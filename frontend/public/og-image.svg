<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="150" cy="530" r="150" fill="#8b5cf6" opacity="0.06"/>

  <!-- Logo mark -->
  <rect x="100" y="200" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="128" y="239" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">F</text>

  <!-- Brand name -->
  <text x="175" y="243" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-1">FLOWIT</text>

  <!-- Tagline -->
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="28" fill="#a5b4fc" letter-spacing="0">IT 부트캠프 수료생을 위한 커뮤니티·협업 플랫폼</text>

  <!-- Divider -->
  <rect x="100" y="350" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Feature pills -->
  <rect x="100" y="385" width="160" height="44" rx="22" fill="#6366f1" opacity="0.2"/>
  <text x="180" y="413" font-family="Arial, sans-serif" font-size="20" fill="#a5b4fc" text-anchor="middle">커뮤니티</text>

  <rect x="278" y="385" width="160" height="44" rx="22" fill="#6366f1" opacity="0.2"/>
  <text x="358" y="413" font-family="Arial, sans-serif" font-size="20" fill="#a5b4fc" text-anchor="middle">팀 빌딩</text>

  <rect x="456" y="385" width="180" height="44" rx="22" fill="#6366f1" opacity="0.2"/>
  <text x="546" y="413" font-family="Arial, sans-serif" font-size="20" fill="#a5b4fc" text-anchor="middle">프로젝트 관리</text>

  <rect x="654" y="385" width="180" height="44" rx="22" fill="#8b5cf6" opacity="0.3"/>
  <text x="744" y="413" font-family="Arial, sans-serif" font-size="20" fill="#c4b5fd" text-anchor="middle">AI 멘토링</text>

  <!-- Bottom URL -->
  <text x="100" y="560" font-family="Arial, sans-serif" font-size="22" fill="#64748b">flowit.kr</text>
</svg>
